name: Publish

on:
  release:
    types: [ published ]

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.3.4
        with:
          fetch-depth: 0
      - name: Node 22.x
        uses: actions/setup-node@v3
        with:
          node-version: 22
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup sbt launcher
        uses: sbt/setup-sbt@v1
      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PGP_PASSPHRASE }}
      - name: List keys
        run: gpg -K
      - id: tag
        run: |
          if [[ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
          echo "tag=$(git tag --points-at $GITHUB_SHA | head -n1 | cut -c2- )" >> "$GITHUB_OUTPUT"
          fi
      - name: Export VITE_BOX_VERSION
        run: echo "VITE_BOX_VERSION=${{ steps.tag.outputs.tag }}" >> $GITHUB_ENV
      - name: Build bundle
        env:
          SBT_OPTS: -XX:+UseG1GC -Xmx4G -Xss10M -XX:MaxInlineLevel=20
        run: |
          cd client
          npm install
          npm run build
          cd ..
      - name: Version info
        run: |
          sbt server/version
          git status
      - name: Publish to sonatype
        run: |
          sbt -J-Xmx4G -J-XX:MaxMetaspaceSize=1G  -J-Xss10m  publishAll
          sbt -J-Xmx4G -J-XX:MaxMetaspaceSize=1G  -J-Xss10m  sonatypeCentralRelease
        env:
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
